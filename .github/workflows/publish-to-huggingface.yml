name: Publish to HuggingFace Datasets

on:
  push:
    branches:
      - main
    paths:
      - 'data/red-team-tools.json'
      - 'data/vulns-leaderboard.csv'
      - 'data/benchmarks.json'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm publication to HuggingFace'
        required: true
        default: 'yes'

permissions:
  contents: read

jobs:
  publish-to-huggingface:
    name: Create and Populate HuggingFace Dataset
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Create HuggingFace dataset repo and upload files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, sys
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN")
          if not token:
              print("SKIP: HF_TOKEN secret not configured.")
              print("To complete setup: add HF_TOKEN as a repository secret")
              print("  1. Go to: https://huggingface.co/settings/tokens")
              print("  2. Create a token with write permissions")
              print("  3. Add it at: https://github.com/alpha-one-index/ai-red-teaming-index/settings/secrets/actions")
              sys.exit(0)

          api = HfApi(token=token)
          REPO_ID = "alpha-one-index/ai-red-teaming-index"
          REPO_TYPE = "dataset"

          print(f"Creating dataset repository: {REPO_ID}")
          try:
              repo_url = api.create_repo(
                  repo_id=REPO_ID,
                  repo_type=REPO_TYPE,
                  private=False,
                  exist_ok=True,
              )
              print(f"Repository created/verified: {repo_url}")
          except Exception as e:
              print(f"Error creating repo: {e}")
              sys.exit(1)

          # Upload data files
          data_files = [
              ("data/red-team-tools.json", "Add red team tools data"),
              ("data/vulns-leaderboard.csv", "Add vulnerability leaderboard data"),
              ("data/benchmarks.json", "Add benchmarks data"),
          ]
          for filepath, msg in data_files:
              print(f"Uploading {filepath}...")
              api.upload_file(
                  path_or_fileobj=filepath,
                  path_in_repo=filepath,
                  repo_id=REPO_ID,
                  repo_type=REPO_TYPE,
                  commit_message=msg,
              )
              print(f"{filepath} uploaded.")

          print(f"\nSuccess! Dataset available at: https://huggingface.co/datasets/{REPO_ID}")
          PYEOF

      - name: Verify dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          from huggingface_hub import HfApi
          import os
          token = os.environ.get("HF_TOKEN")
          if not token:
              print("Verification skipped: HF_TOKEN not configured")
          else:
              api = HfApi(token=token)
              files = list(api.list_repo_files(repo_id="alpha-one-index/ai-red-teaming-index", repo_type="dataset"))
              print("Files in dataset repository:")
              for f in files:
                  print(f"  - {f}")
              print(f"Total files: {len(files)}")
          PYEOF
