name: Publish to Kaggle
on:
  push:
    paths:
      - 'data/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"'"$KAGGLE_USERNAME"'","key":"'"$KAGGLE_KEY"'"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          echo "Credentials configured."

      - name: Test authentication
        run: |
          kaggle datasets list -s test --max-size 1
          echo "Authentication successful."

      - name: Prepare dataset
        run: |
          mkdir -p kaggle_upload
          cp data/red-team-tools.json kaggle_upload/
          cp data/vulns-leaderboard.csv kaggle_upload/
          cp data/benchmarks.json kaggle_upload/
          cp kaggle/dataset-metadata.json kaggle_upload/

      - name: Upload to Kaggle
        run: |
          echo "Creating dataset on Kaggle..."
          kaggle datasets create -p kaggle_upload -u
